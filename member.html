<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_top">
    <title>ACCESS MANAGEMENT SYSTEM</title>
 
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css" 
    integrity="sha384-GJzZqFGwb1QTTN6wy59ffF1BuGJpLSa9DkKMp0DgiMDm4iYMj70gZWKYbI706tWS" crossorigin="anonymous">
    <!-- fontawesome　-->
    <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
  
      <style>
        body { padding-top: 2rem; padding-bottom: 2rem; }
        .button-container {
             margin-bottom: 2rem;
        }
        .table-container {
            max-width: 400px; /* 表の幅を調整 */
            margin-left: auto;
            margin-right: auto;
        }
        .table th, .table td {
            vertical-align: middle;
            text-align: center; /* 名前と状態は中央揃えが見やすいかも */
        }
        .name-col { /* 名前列のスタイル (任意) */
             text-align: left; /* 名前は左揃えの方が見やすい場合 */
        }
        .status-col { /* 状態列の幅 (任意) */
            width: 120px; /* 「入室中」「退室中」が表示できる幅 */
        }

    </style>

  </head>
  <body>

  <!---> ここより下の部分(特に処理部)は made by Gemini 2.5 <--->
  <div class="container">
      <div class="row align-items-center" style="height:10rem">
      </div>   
      <div class="mx-auto" style="max-width: 30rem;">    
        <a class="text-dark text-center" href="<?= url ?>?p=index">
        <i class="fas fa-backspace fa-2x"></i>&nbsp;戻る</a>      
      </div>
      <br/>
      <div class="table-container">
          <table class="table table-striped table-bordered table-hover table-sm">
              <thead class="thead-light"> <!-- 明るい色 --->
                  <tr>
                      <!-- ▼▼▼ ヘッダーを「名前」と「状態」に変更 ▼▼▼ -->
                      <th scope="col" class="name-col">名前</th>
                      <th scope="col" class="status-col">状態</th>
                      <!-- ▲▲▲ ヘッダーを「名前」と「状態」に変更 ▲▲▲ -->
                  </tr>
              </thead>
              <tbody id="member-list-body">
                  <? // GASから渡された 'members' 配列 (連想配列の配列) をループ処理 ?>
                  <? if (members && members.length > 0) { ?>
                      <? for (var i = 0; i < members.length; i++) { ?>
                          <? var member = members[i]; // 1人分のデータ {"address":..., "name":..., "status":...} ?>
                          <tr>
                              <!-- ▼▼▼ name と status を表示 ▼▼▼ -->
                              <td class="name-col"><?= member.name ?></td> <!-- 名前 (name) を表示 -->
                              <td class="status-col">
                                  <? // status (true/false または "TRUE"/"FALSE") に応じて表示を変える ?>
                                  <? // ブール値 (true/false) を想定した書き方 (推奨) ?>
                                  <? if (member.status === true) { ?>
                                      <span class="badge badge-info">入室中</span>
                                  <? } else if (member.status === false) { ?>
                                      <span class="badge badge-secondary">退室中</span>
                                  <? } else {
                                       // 文字列 "TRUE"/"FALSE" も考慮する場合 (ブール値に統一できれば不要)
                                       var statusStr = String(member.status).toUpperCase();
                                       if (statusStr === "IN") { ?>
                                         <span class="badge badge-info">入室中</span>
                                       <? } else if (statusStr === "HOME") { ?>
                                         <span class="badge badge-secondary">帰宅</span>
                                       <? } else if (statusStr === "CLASS") { ?>
                                         <span class="badge badge-secondary">退室中: 講義</span>       
                                       <? } else if (statusStr === "UNIV") { ?>
                                         <span class="badge badge-secondary">退室中: 学内外出</span> 
                                       <? } else if (statusStr === "INVEST") { ?>
                                         <span class="badge badge-secondary">調査: 学外外出</span>                                 
                                       <? } else { ?>
                                         <span class="badge badge-light">Error:<?= member.status ?></span>
                                       <? }
                                     } ?>
                              </td>
                              <!-- ▲▲▲ name と status を表示 ▲▲▲ -->
                          </tr>
                      <? } ?>
                  <? } else { ?>
                      <tr>
                          <!-- ▼▼▼ colspanを列数(2)に変更 ▼▼▼ -->
                          <td colspan="2" class="text-center text-muted">メンバーデータがありません。</td>
                          <!-- ▲▲▲ colspanを列数(2)に変更 ▲▲▲ -->
                      </tr>
                  <? } ?>
              </tbody>
          </table>
          <div id="update-status" class="text-center text-muted small mt-2"></div> <!-- 更新状況表示用 -->
      </div>
  </div><!-- /.container -->
  </body>
</html>
<script>
    // 定期更新の間隔 (ミリ秒) - 例: 15秒 (GASの実行時間や制限を考慮)
    const UPDATE_INTERVAL = 15000;
    // テーブルのtbody要素を取得
    const tableBody = document.getElementById('member-list-body');
    // 更新状況表示用の要素を取得
    const updateStatusDiv = document.getElementById('update-status');

    // テーブルの内容を更新する関数
    function updateTable(membersData) {
      if (!tableBody) return; // 要素が見つからない場合は何もしない

      // 更新中を示すスタイルを一時的に適用（任意）
      tableBody.classList.add('updating');
      updateStatusDiv.textContent = '更新中...';

      let tableHtml = ''; // 新しいHTMLコンテンツを格納する変数

      if (membersData && membersData.length > 0) {
        // 必要ならここでクライアント側でソート
        // membersData.sort((a, b) => a.name.localeCompare(b.name, 'ja'));

        membersData.forEach(member => {
          let statusBadge = '';
          const statusStr = String(member.status).toUpperCase(); // statusを大文字文字列に

          // GASテンプレート内のロジックをJavaScriptで再現
          if (statusStr === "IN") {
            statusBadge = '<span class="badge badge-info">入室中</span>';
          } else if (statusStr === "HOME") {
            statusBadge = '<span class="badge badge-secondary">帰宅</span>';
          } else if (statusStr === "CLASS") {
            statusBadge = '<span class="badge badge-secondary">退室中: 講義</span>';
          } else if (statusStr === "UNIV") {
            statusBadge = '<span class="badge badge-secondary">退室中: 学内外出</span>';
          } else if (statusStr === "INVEST") {
            statusBadge = '<span class="badge badge-secondary">調査: 学外外出</span>';
          } else if (member.status === false || statusStr === "FALSE") { // ブール値 false も考慮
            statusBadge = '<span class="badge badge-secondary">退室中</span>'; // デフォルトの退室中
          } else {
            statusBadge = `<span class="badge badge-light">不明:${member.status}</span>`; // 不明なステータス
          }

          // HTMLインジェクション対策としてエスケープすべきだが、今回は簡略化
          // 本番環境では name 等のエスケープを検討してください
          const safeName = member.name; // 本来はエスケープ処理が必要

          // 1行分のHTMLを生成
          tableHtml += `
            <tr>
              <td class="name-col">${safeName}</td>
              <td class="status-col">${statusBadge}</td>
            </tr>
          `;
        });
      } else {
        // データがない場合の表示
        tableHtml = '<tr><td colspan="2" class="text-center text-muted">メンバーデータがありません。</td></tr>';
      }

      // tbodyの中身を新しいHTMLで上書き
      tableBody.innerHTML = tableHtml;

      // 更新完了後、スタイルを元に戻し、最終更新時刻を表示
      const now = new Date();
      updateStatusDiv.textContent = `最終更新: ${now.toLocaleTimeString()}`;
      setTimeout(() => {
          tableBody.classList.remove('updating');
      }, 150); // 少し遅延させてスタイルを戻す
    }

    // GASの関数を呼び出してデータを取得・更新する関数
    function fetchAndUpdateData() {
      console.log("Fetching member data..."); // ログ
      updateStatusDiv.textContent = 'データ取得中...'; // ユーザーへのフィードバック

      google.script.run
        .withSuccessHandler(function(dataFromServer) {
          console.log("Data fetched successfully"); // 成功ログ
          // console.log(dataFromServer); // デバッグ用にデータ内容を確認
          updateTable(dataFromServer); // 取得したデータでテーブルを更新
        })
        .withFailureHandler(function(error) {
          console.error('Error fetching data: ' + error.message);
          updateStatusDiv.textContent = `エラー: ${error.message}`;
          // エラーが発生しても更新中スタイルは解除
          tableBody.classList.remove('updating');
        })
        .getMemberData(); // GAS側の関数名を指定
    }

    // ページ読み込み完了時に関数を初回実行し、その後タイマーを設定
    document.addEventListener('DOMContentLoaded', (event) => {
       console.log("Page loaded. Performing initial fetch.");
       // 初回表示もJavaScriptで描画する場合は、GASテンプレート側のtbody内は空にするかコメントアウト推奨
       // ここでは初回も念のため更新をかける
       fetchAndUpdateData();

       console.log(`Starting interval timer (${UPDATE_INTERVAL}ms).`);
       // 定期的にデータを取得・更新するタイマーを設定
       setInterval(fetchAndUpdateData, UPDATE_INTERVAL);
    });

  </script>
